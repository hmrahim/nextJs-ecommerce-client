<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669" />
      <stop offset="100%" style="stop-color:#10b981" />
    </linearGradient>
    <linearGradient id="dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#047857" />
      <stop offset="100%" style="stop-color:#059669" />
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Shopping bag icon -->
  <!-- Handle -->
  <path d="M168 210 Q168 140 256 140 Q344 140 344 210" stroke="white" stroke-width="24" fill="none" stroke-linecap="round"/>
  <!-- Bag body -->
  <rect x="136" y="198" width="240" height="180" rx="28" fill="white" opacity="0.95"/>
  <!-- Checkmark -->
  <path d="M196 288 L236 328 L316 248" stroke="url(#dark)" stroke-width="22" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- "24" text bottom right corner -->
  <text x="320" y="460" font-family="'Segoe UI', Arial, sans-serif" font-weight="900" font-size="72" fill="white" opacity="0.9">24</text>
</svg>
