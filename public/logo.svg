<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#047857;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Icon mark — shopping bag -->
  <rect x="8" y="8" width="64" height="64" rx="16" fill="url(#grad)"/>
  <!-- Bag handle -->
  <path d="M28 30 Q28 20 40 20 Q52 20 52 30" stroke="white" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- Bag body -->
  <rect x="22" y="28" width="36" height="28" rx="5" fill="white" opacity="0.95"/>
  <!-- Checkmark inside bag -->
  <path d="M31 42 L37 48 L49 36" stroke="url(#grad2)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Moom24 text -->
  <!-- M -->
  <text x="86" y="54" font-family="'Segoe UI', Arial, sans-serif" font-weight="800" font-size="38" fill="#111827">M</text>
  <!-- oom -->
  <text x="122" y="54" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" font-size="38" fill="#374151">oom</text>
  <!-- 24 -->
  <text x="222" y="54" font-family="'Segoe UI', Arial, sans-serif" font-weight="800" font-size="38" fill="url(#grad)">24</text>

  <!-- Tagline -->
  <text x="87" y="68" font-family="'Segoe UI', Arial, sans-serif" font-weight="400" font-size="10" fill="#6b7280" letter-spacing="2">SHOP SMART · LIVE BETTER</text>
</svg>
